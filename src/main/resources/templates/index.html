<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Task Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>


  <body style="background-color: #f5f7fa">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold" . style="color: #1e293b">Task Manager</h1>

        <button
          class="btn"
          style="
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
          "
          data-bs-toggle="modal"
          data-bs-target="#taskModal"
        >
          Create Task
        </button>
      </div>

      <div class="d-flex gap-2 mb-4">
        <form action="/search" method="get" class="d-flex flex-grow-1">
          <div class="position-relative w-100">
            <input
              type="text"
              name="keyword"
              th:value="${keyword}"
              class="form-control form-control-lg shadow-sm"
              placeholder="Search task..."
              style="border-radius: 18px; height: 55px; padding-right: 70px"
            />

            <button
              th:if="${keyword == null}"
              type="submit"
              class="btn border-0"
              style="
                background: transparent;
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 22px;
                color: #6b7280;
              "
            >
              <i class="fa fa-search"></i>
            </button>

            <a
              th:if="${keyword != null}"
              href="/tasks"
              style="
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 30px;
                color: #6b7280;
                text-decoration: none;
              "
            >
              <!-- <i class="fa fa-times"></i> -->
              <i class="fa-solid fa-xmark"></i>
            </a>
          </div>
        </form>

        <div class="dropdown">
          <button
            class="btn dropdown-toggle"
            style="
              background: #0f172a;
              color: white;
              border-radius: 12px;
              padding: 0 20px;
              height: 50px;
            "
            type="button"
            data-bs-toggle="dropdown"
          >
            <span
              th:text="${selectedStatus != null ? selectedStatus : 'Filter'}"
            >
              Filter
            </span>
          </button>

          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item" href="/filter?status=All"> All </a>
            </li>

            <li>
              <a class="dropdown-item" href="/filter?status=Pending">
                Pending
              </a>
            </li>

            <li>
              <a class="dropdown-item" href="/filter?status=In Progress">
                In Progress
              </a>
            </li>

            <li>
              <a class="dropdown-item" href="/filter?status=Completed">
                Completed
              </a>
            </li>
          </ul>
        </div>
      </div>

      <div class="card border-0 shadow-sm" style="border-radius: 18px">
        <div class="card-body">
          <h4 class="mb-4 fw-bold">Task List</h4>

          <table class="table align-middle">
            <thead style="background: #0f172a; color: white">
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th width="180">Action</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="task : ${tasks}">
                <td th:text="${task.id}"></td>

                <td th:text="${task.title}"></td>

                <td th:text="${task.description}"></td>

                <td>
                  <span
                    th:if="${task.status == 'Pending'}"
                    class="badge"
                    style="
                      background: #facc15;
                      color: #111827;
                      padding: 8px 12px;
                      border-radius: 8px;
                      font-size: 13px;
                    "
                  >
                    Pending
                  </span>

                  <span
                    th:if="${task.status == 'In Progress'}"
                    class="badge"
                    style="
                      background: #3b82f6;
                      padding: 8px 12px;
                      border-radius: 8px;
                      font-size: 13px;
                    "
                  >
                    In Progress
                  </span>

                  <span
                    th:if="${task.status == 'Completed'}"
                    class="badge"
                    style="
                      background: #22c55e;
                      padding: 8px 12px;
                      border-radius: 8px;
                      font-size: 13px;
                    "
                  >
                    Completed
                  </span>
                </td>

                <td>
                  <a
                    th:href="@{'/editTask/' + ${task.id}}"
                    class="btn btn-sm"
                    style="
                      background: #facc15;
                      border: none;
                      padding: 6px 14px;
                      border-radius: 8px;
                    "
                  >
                    Edit
                  </a>

                  <a
                    th:href="@{'/deleteTask/' + ${task.id}}"
                    class="btn btn-sm"
                    style="
                      background: #ef4444;
                      color: white;
                      padding: 6px 14px;
                      border-radius: 8px;
                    "
                  >
                    Delete
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content border-0" style="border-radius: 18px">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold">Task Form</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form th:action="@{/saveTask}" th:object="${task}" method="post">
              <input type="hidden" th:field="*{id}" />
              <label class="mb-2 fw-semibold"> Title </label>

              <input
                type="text"
                th:field="*{title}"
                class="form-control"
                required
                minlength="2"
                placeholder="Enter task title"
                style="height: 50px; border-radius: 12px"
              />

              <br />

              <label class="mb-2 fw-semibold"> Description </label>

              <textarea
                th:field="*{description}"
                class="form-control"
                rows="4"
                style="border-radius: 12px"
              >
              </textarea>

              <br />

              <label class="mb-2 fw-semibold"> Status </label>

              <select
                th:field="*{status}"
                class="form-select"
                style="height: 50px; border-radius: 12px"
              >
                <option value="Pending">Pending</option>

                <option value="In Progress">In Progress</option>

                <option value="Completed">Completed</option>
              </select>

              <br />

              <button
                type="submit"
                class="btn w-100"
                style="
                  background: #2563eb;
                  color: white;
                  height: 50px;
                  border-radius: 12px;
                "
              >
                Save Task
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:if="${editMode}">
      window.onload = function () {
        var myModal = new bootstrap.Modal(document.getElementById("taskModal"));

        myModal.show();
      };
    </script>
  </body>
</html>
