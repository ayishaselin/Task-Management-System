<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Task Manager</title>
</head>

<body>

    <h1>Task Manager</h1>

   <form th:action="@{/saveTask}" th:object="${task}" method="post">
    <input type="hidden" th:field="*{id}">

        <label>Title:</label><br>
      <input type="text" th:field="*{title}"><br><br>

        <label>Description:</label><br>
        <textarea th:field="*{description}"></textarea><br><br>

        <label>Status:</label><br>
        <input type="text" th:field="*{status}"><br><br>

        <button type="submit">Save Task</button>

    </form>
     <h2>Task List</h2>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="task : ${tasks}">
        <td th:text="${task.id}"></td>
        <td th:text="${task.title}"></td>
        <td th:text="${task.description}"></td>
        <td th:text="${task.status}"></td>

        <td>

    <a th:href="@{'/editTask/' + ${task.id}}">
        Edit
    </a>

    |

    <a th:href="@{'/deleteTask/' + ${task.id}}">
        Delete
    </a>

</td>
    </tr>

</table>
</body>

</html>
